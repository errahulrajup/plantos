events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream api_gateway {
        server plantos-api:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # Static Assets (Studio UI)
        location /studio/ {
            alias /var/www/studio/dist/;
            index index.html;
            try_files $uri $uri/ /studio/index.html;
        }

        # Static Assets (Operator UI)
        location /operator/ {
            alias /var/www/operator/dist/;
            index index.html;
            try_files $uri $uri/ /operator/index.html;
        }

        # API Gateway Routes
        location /api/ {
            proxy_pass http://api_gateway/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket Proxy for Telemetry & Workflow
        location /ws/ {
            proxy_pass http://api_gateway/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
